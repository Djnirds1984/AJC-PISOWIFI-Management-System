<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AJC PISOWIFI - Access Portal</title>
    
    <!-- Lightweight Custom CSS Framework -->
    <link rel="stylesheet" href="/styles/lightweight.css">
    
    <script>
      // Instant Theme Restore
      (function() {
        try {
          var theme = localStorage.getItem('ajc_pisowifi_theme') || 'default';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
    <style>
      /* Lightweight Theme System */
      :root, :root[data-theme="default"] {
        --primary: #0066cc;
        --primary-dark: #004499;
        --bg: #f9fafb;
        --bg-card: #ffffff;
        --text-main: #111827;
        --text-muted: #6b7280;
        --border: #e5e7eb;
        --shadow-color: 0, 0, 0;
        --radius-sm: 0.25rem;
        --radius-md: 0.5rem;
        --radius-lg: 0.75rem;
        --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      :root[data-theme="dark"] {
        --primary: #38bdf8;
        --primary-dark: #0ea5e9;
        --bg: #0f172a;
        --bg-card: #1e293b;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --border: #334155;
      }

      :root[data-theme="terminal"] {
        --primary: #22c55e;
        --primary-dark: #16a34a;
        --bg: #000000;
        --bg-card: #111111;
        --text-main: #22c55e;
        --text-muted: #15803d;
        --border: #15803d;
        --font-main: "Courier New", Courier, monospace;
      }
      
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      
      body { 
        font-family: var(--font-main); 
        background-color: var(--bg);
        color: var(--text-main);
        line-height: 1.5;
        min-height: 100vh;
        transition: background-color 0.3s ease, color 0.3s ease;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* INSTANT SPLASH SCREEN */
      #splash {
        position: fixed;
        inset: 0;
        background: var(--bg);
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease-out;
      }
      .loader {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(var(--shadow-color), 0.1);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 1rem;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #splash p { color: var(--text-main); font-weight: 900; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; }

      #root { min-height: 100vh; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "socket.io-client": "https://esm.sh/socket.io-client@^4.8.3"
  }
}
</script>
</head>
  <body>
    <div id="splash">
      <div class="loader"></div>
      <p>AJC System Engine Loading...</p>
    </div>

    <div id="root"></div>
    
    <script type="module">
      // Hide splash when everything is ready
      window.addEventListener('load', () => {
        const s = document.getElementById('splash');
        if (s) {
          s.style.opacity = '0';
          setTimeout(() => s.remove(), 500);
        }
      });
    </script>

    <!-- The local bundle.js contains everything pre-packaged by esbuild -->
    <script type="module" src="/dist/bundle.js"></script>
  </body>
</html>
