<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightweight UI Test</title>
    <link rel="stylesheet" href="/styles/lightweight.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1 class="card-title">AJC PisoWiFi - Lightweight UI Test</h1>
            </div>
            <p class="text-muted mb-4">Testing the lightweight CSS framework</p>
            <div class="flex gap-4">
                <button class="btn btn-primary">Primary Button</button>
                <button class="btn btn-secondary">Secondary Button</button>
            </div>
            <div class="stats-grid mt-4">
                <div class="stat-card">
                    <div class="stat-value">42</div>
                    <div class="stat-label">Active Sessions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">1.2GB</div>
                    <div class="stat-label">Data Usage</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
